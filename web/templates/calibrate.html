{% extends "base.html" %}
{% block title_suffix %} — Calibrate{% endblock %}
{% block body_class %}calibrate-page{% endblock %}

{% block content %}
<div class="cal-toolbar">
    <select id="cal-device">
        {% for d in devices %}
        <option value="{{ d.id }}">{{ d.name }}</option>
        {% endfor %}
    </select>
    <button class="cal-btn-capture" id="cal-capture">Capture</button>
    <button class="cal-btn-record" id="cal-record">Record</button>
</div>

<div class="cal-canvas-wrap" id="cal-wrap">
    <div class="cal-placeholder" id="cal-placeholder">Select a device and tap Capture</div>
    <canvas id="cal-canvas" width="1080" height="1920" style="display:none"></canvas>
</div>

<div class="cal-coords" id="cal-coords" style="display:none">
    <span class="cal-label">XY</span>
    <span class="cal-value" id="cal-xy">—</span>
    <button class="cal-copy-btn" id="cal-copy-xy">Copy</button>
</div>

<div id="cal-region-wrap" style="display:none">
    <div class="cal-region">
        <span class="cal-label">Region</span>
        <span class="cal-value" id="cal-region-val">—</span>
        <button class="cal-copy-btn" id="cal-copy-region">Copy</button>
    </div>
    <div class="cal-region-actions">
        <input type="text" id="cal-filename" placeholder="template_name.png">
        <label class="cal-overwrite"><input type="checkbox" id="cal-overwrite"> Overwrite</label>
        <button id="cal-save-crop">Save Template</button>
    </div>
</div>

<div class="cal-section-title">Recent Clicks</div>
<div class="cal-log" id="cal-log"></div>

<div id="cal-recording-section" style="display:none">
    <div class="cal-section-title">Recording</div>
    <div class="cal-timeline" id="cal-timeline"></div>
    <div class="cal-export-row">
        <input type="text" id="cal-export-name" placeholder="sequence_name">
        <button id="cal-export">Export</button>
        <button id="cal-clear" style="background:#3a1a1a;border-color:#633">Clear</button>
    </div>
</div>

<div class="cal-toast" id="cal-toast"></div>
{% endblock %}

{% block scripts %}
<script>
(function() {
    var canvas = document.getElementById('cal-canvas');
    var ctx = canvas.getContext('2d');
    var wrap = document.getElementById('cal-wrap');
    var placeholder = document.getElementById('cal-placeholder');
    var coordsBar = document.getElementById('cal-coords');
    var xySpan = document.getElementById('cal-xy');
    var regionWrap = document.getElementById('cal-region-wrap');
    var regionVal = document.getElementById('cal-region-val');
    var recSection = document.getElementById('cal-recording-section');
    var timeline = document.getElementById('cal-timeline');
    var logEl = document.getElementById('cal-log');

    var img = null;          // current Image object
    var scaleX = 1, scaleY = 1;
    var dragStart = null;    // {cx, cy} canvas-local px
    var dragging = false;
    var lastRegion = null;   // {x1,y1,x2,y2} in game coords
    var recording = false;
    var steps = [];
    var clickLog = [];

    function device() { return document.getElementById('cal-device').value; }

    function toast(msg) {
        var el = document.getElementById('cal-toast');
        el.textContent = msg;
        el.classList.add('show');
        setTimeout(function() { el.classList.remove('show'); }, 1800);
    }

    function copyText(text) {
        if (navigator.clipboard) {
            navigator.clipboard.writeText(text).then(function() { toast('Copied'); });
        } else {
            var ta = document.createElement('textarea');
            ta.value = text; document.body.appendChild(ta);
            ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
            toast('Copied');
        }
    }

    function gameCoords(e) {
        var rect = canvas.getBoundingClientRect();
        var cx, cy;
        if (e.touches) {
            cx = e.touches[0].clientX - rect.left;
            cy = e.touches[0].clientY - rect.top;
        } else {
            cx = e.clientX - rect.left;
            cy = e.clientY - rect.top;
        }
        var gx = Math.round(cx * scaleX);
        var gy = Math.round(cy * scaleY);
        return {cx: cx, cy: cy, gx: Math.max(0, Math.min(1080, gx)), gy: Math.max(0, Math.min(1920, gy))};
    }

    function updateScales() {
        var rect = canvas.getBoundingClientRect();
        scaleX = 1080 / rect.width;
        scaleY = 1920 / rect.height;
    }

    function drawFrame() {
        if (!img) return;
        ctx.drawImage(img, 0, 0, 1080, 1920);
    }

    function drawCrosshair(gx, gy) {
        drawFrame();
        ctx.strokeStyle = '#0ff';
        ctx.lineWidth = 2;
        ctx.setLineDash([]);
        // horizontal
        ctx.beginPath(); ctx.moveTo(0, gy); ctx.lineTo(1080, gy); ctx.stroke();
        // vertical
        ctx.beginPath(); ctx.moveTo(gx, 0); ctx.lineTo(gx, 1920); ctx.stroke();
        // circle
        ctx.beginPath(); ctx.arc(gx, gy, 16, 0, Math.PI * 2); ctx.stroke();
    }

    function drawSelection(x1, y1, x2, y2) {
        drawFrame();
        ctx.strokeStyle = '#0ff';
        ctx.lineWidth = 2;
        ctx.setLineDash([8, 4]);
        ctx.strokeRect(x1, y1, x2 - x1, y2 - y1);
        ctx.setLineDash([]);
        // Dim outside
        ctx.fillStyle = 'rgba(0,0,0,0.4)';
        ctx.fillRect(0, 0, 1080, y1);            // top
        ctx.fillRect(0, y2, 1080, 1920 - y2);    // bottom
        ctx.fillRect(0, y1, x1, y2 - y1);        // left
        ctx.fillRect(x2, y1, 1080 - x2, y2 - y1); // right
    }

    function loadImageFromUrl(url, cb) {
        var i = new Image();
        i.onload = function() {
            img = i;
            canvas.style.display = 'block';
            placeholder.style.display = 'none';
            drawFrame();
            updateScales();
            if (cb) cb();
        };
        i.onerror = function() { toast('Failed to load screenshot'); };
        i.src = url;
    }

    function addClickLog(gx, gy) {
        clickLog.unshift({x: gx, y: gy});
        if (clickLog.length > 20) clickLog.pop();
        renderLog();
    }

    function renderLog() {
        logEl.innerHTML = '';
        for (var i = 0; i < clickLog.length; i++) {
            var entry = clickLog[i];
            var div = document.createElement('div');
            div.className = 'cal-log-entry';
            var idx = document.createElement('span');
            idx.className = 'cal-idx';
            idx.textContent = (i + 1);
            var val = document.createElement('span');
            val.className = 'cal-value';
            val.textContent = entry.x + ', ' + entry.y;
            var btn = document.createElement('button');
            btn.className = 'cal-copy-btn';
            btn.textContent = 'Copy';
            (function(text) {
                btn.addEventListener('click', function() { copyText(text); });
            })(entry.x + ', ' + entry.y);
            div.appendChild(idx);
            div.appendChild(val);
            div.appendChild(btn);
            logEl.appendChild(div);
        }
    }

    function addStep(type, data) {
        steps.push({type: type, data: data});
        renderTimeline();
    }

    function renderTimeline() {
        timeline.innerHTML = '';
        for (var i = 0; i < steps.length; i++) {
            var s = steps[i];
            var div = document.createElement('div');
            div.className = 'cal-step';
            var num = document.createElement('div');
            num.className = 'cal-step-num';
            num.textContent = (i + 1);
            var info = document.createElement('div');
            info.className = 'cal-step-info';
            if (s.type === 'tap') {
                info.innerHTML = 'Tap <strong>' + s.data.x + ', ' + s.data.y + '</strong>';
            } else if (s.type === 'crop') {
                info.innerHTML = 'Crop <strong>' + s.data.filename + '</strong> (' + s.data.x1 + ',' + s.data.y1 + ')→(' + s.data.x2 + ',' + s.data.y2 + ')';
            }
            div.appendChild(num);
            div.appendChild(info);
            if (s.thumb) {
                var thumb = document.createElement('img');
                thumb.className = 'cal-step-thumb';
                thumb.src = s.thumb;
                div.appendChild(thumb);
            }
            timeline.appendChild(div);
        }
        timeline.scrollTop = timeline.scrollHeight;
    }

    // --- Capture ---
    document.getElementById('cal-capture').addEventListener('click', function() {
        var d = device();
        if (!d) return;
        this.disabled = true;
        var self = this;
        var url = RELAY_PREFIX + '/api/screenshot?device=' + encodeURIComponent(d) + '&_t=' + Date.now();
        loadImageFromUrl(url, function() {
            self.disabled = false;
            coordsBar.style.display = 'none';
            regionWrap.style.display = 'none';
            lastRegion = null;
        });
        setTimeout(function() { self.disabled = false; }, 5000); // safety
    });

    // --- Mouse / touch handlers ---
    function onPointerDown(e) {
        if (!img) return;
        e.preventDefault();
        updateScales();
        var p = gameCoords(e);
        dragStart = {cx: p.cx, cy: p.cy, gx: p.gx, gy: p.gy};
        dragging = false;
        regionWrap.style.display = 'none';
        lastRegion = null;
    }

    function onPointerMove(e) {
        if (!dragStart || !img) return;
        e.preventDefault();
        updateScales();
        var p = gameCoords(e);
        var dx = Math.abs(p.cx - dragStart.cx);
        var dy = Math.abs(p.cy - dragStart.cy);
        if (dx > 5 || dy > 5) dragging = true;
        if (dragging) {
            var x1 = Math.min(dragStart.gx, p.gx);
            var y1 = Math.min(dragStart.gy, p.gy);
            var x2 = Math.max(dragStart.gx, p.gx);
            var y2 = Math.max(dragStart.gy, p.gy);
            drawSelection(x1, y1, x2, y2);
        }
        // Always show live coords
        xySpan.textContent = p.gx + ', ' + p.gy;
        coordsBar.style.display = 'flex';
    }

    function onPointerUp(e) {
        if (!dragStart || !img) return;
        e.preventDefault();
        updateScales();
        var p = gameCoords(e);
        if (dragging) {
            // Region selection complete
            var x1 = Math.min(dragStart.gx, p.gx);
            var y1 = Math.min(dragStart.gy, p.gy);
            var x2 = Math.max(dragStart.gx, p.gx);
            var y2 = Math.max(dragStart.gy, p.gy);
            if (x2 - x1 > 2 && y2 - y1 > 2) {
                lastRegion = {x1: x1, y1: y1, x2: x2, y2: y2};
                regionVal.textContent = x1 + ', ' + y1 + ', ' + x2 + ', ' + y2;
                regionWrap.style.display = 'block';
                drawSelection(x1, y1, x2, y2);
            }
        } else {
            // Click
            var gx = dragStart.gx, gy = dragStart.gy;
            drawCrosshair(gx, gy);
            xySpan.textContent = gx + ', ' + gy;
            coordsBar.style.display = 'flex';
            addClickLog(gx, gy);

            if (recording) {
                // Get thumbnail before tap
                var thumbUrl = canvas.toDataURL('image/jpeg', 0.5);
                var btn = document.getElementById('cal-capture');
                btn.disabled = true;
                fetch(RELAY_PREFIX + '/api/calibrate/tap', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({device: device(), x: gx, y: gy})
                }).then(function(r) {
                    if (!r.ok) throw new Error('Tap failed');
                    return r.blob();
                }).then(function(blob) {
                    var url = URL.createObjectURL(blob);
                    loadImageFromUrl(url, function() {
                        URL.revokeObjectURL(url);
                        btn.disabled = false;
                    });
                    addStep('tap', {x: gx, y: gy});
                    steps[steps.length - 1].thumb = thumbUrl;
                    renderTimeline();
                }).catch(function(err) {
                    toast('Tap failed: ' + err.message);
                    btn.disabled = false;
                });
            }
        }
        dragStart = null;
        dragging = false;
    }

    canvas.addEventListener('mousedown', onPointerDown);
    canvas.addEventListener('mousemove', onPointerMove);
    canvas.addEventListener('mouseup', onPointerUp);
    canvas.addEventListener('touchstart', onPointerDown, {passive: false});
    canvas.addEventListener('touchmove', onPointerMove, {passive: false});
    canvas.addEventListener('touchend', function(e) {
        // touchend has no touches, use changedTouches for final position
        if (!dragStart || !img) return;
        e.preventDefault();
        // Use dragStart position for click (no movement), else last known
        if (!dragging) {
            drawCrosshair(dragStart.gx, dragStart.gy);
            xySpan.textContent = dragStart.gx + ', ' + dragStart.gy;
            coordsBar.style.display = 'flex';
            addClickLog(dragStart.gx, dragStart.gy);
            if (recording) {
                var thumbUrl = canvas.toDataURL('image/jpeg', 0.5);
                fetch(RELAY_PREFIX + '/api/calibrate/tap', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({device: device(), x: dragStart.gx, y: dragStart.gy})
                }).then(function(r) {
                    if (!r.ok) throw new Error('Tap failed');
                    return r.blob();
                }).then(function(blob) {
                    var url = URL.createObjectURL(blob);
                    loadImageFromUrl(url, function() { URL.revokeObjectURL(url); });
                    addStep('tap', {x: dragStart.gx, y: dragStart.gy});
                    steps[steps.length - 1].thumb = thumbUrl;
                    renderTimeline();
                }).catch(function(err) { toast('Tap failed'); });
            }
        } else {
            // Drag end — use last drawn selection
            if (lastRegion) {
                regionVal.textContent = lastRegion.x1 + ', ' + lastRegion.y1 + ', ' + lastRegion.x2 + ', ' + lastRegion.y2;
                regionWrap.style.display = 'block';
            }
        }
        dragStart = null;
        dragging = false;
    }, {passive: false});

    // Recalc scales on resize
    window.addEventListener('resize', updateScales);

    // --- Copy buttons ---
    document.getElementById('cal-copy-xy').addEventListener('click', function() {
        copyText(xySpan.textContent);
    });
    document.getElementById('cal-copy-region').addEventListener('click', function() {
        copyText(regionVal.textContent);
    });

    // --- Save template ---
    document.getElementById('cal-save-crop').addEventListener('click', function() {
        if (!lastRegion) return;
        var fn = document.getElementById('cal-filename').value.trim();
        if (!fn) { toast('Enter a filename'); return; }
        var ow = document.getElementById('cal-overwrite').checked;
        var body = {
            device: device(),
            x1: lastRegion.x1, y1: lastRegion.y1,
            x2: lastRegion.x2, y2: lastRegion.y2,
            filename: fn, overwrite: ow
        };
        fetch(RELAY_PREFIX + '/api/calibrate/crop', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(body)
        }).then(function(r) { return r.json(); })
        .then(function(data) {
            if (data.error) {
                if (data.exists) toast(fn + ' exists — check Overwrite');
                else toast(data.error);
                return;
            }
            toast('Saved ' + data.filename + ' (' + data.width + 'x' + data.height + ')');
            if (recording) {
                addStep('crop', {
                    filename: data.filename,
                    x1: lastRegion.x1, y1: lastRegion.y1,
                    x2: lastRegion.x2, y2: lastRegion.y2
                });
            }
            regionWrap.style.display = 'none';
            lastRegion = null;
            drawFrame();
        }).catch(function() { toast('Save failed'); });
    });

    // --- Record toggle ---
    document.getElementById('cal-record').addEventListener('click', function() {
        recording = !recording;
        this.classList.toggle('active', recording);
        this.textContent = recording ? 'Stop Rec' : 'Record';
        recSection.style.display = recording || steps.length ? 'block' : 'none';
    });

    // --- Export ---
    document.getElementById('cal-export').addEventListener('click', function() {
        if (!steps.length) { toast('No steps to export'); return; }
        var name = document.getElementById('cal-export-name').value.trim();
        if (!name) { toast('Enter a name'); return; }
        // Strip thumbnails for export
        var clean = steps.map(function(s) { return {type: s.type, data: s.data}; });
        fetch(RELAY_PREFIX + '/api/calibrate/export', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({name: name, steps: clean})
        }).then(function(r) { return r.json(); })
        .then(function(data) {
            if (data.error) { toast(data.error); return; }
            toast('Exported to ' + data.path);
        }).catch(function() { toast('Export failed'); });
    });

    // --- Clear ---
    document.getElementById('cal-clear').addEventListener('click', function() {
        steps = [];
        renderTimeline();
        if (!recording) recSection.style.display = 'none';
    });
})();
</script>
{% endblock %}
