{% extends "base.html" %}
{% block title_suffix %} - Chat{% endblock %}
{% block body_class %}chat-page{% endblock %}

{% block content %}

<div class="chat-page-wrap">
    <div class="chat-page-controls">
        <select id="device-select" class="chat-page-select" onchange="loadChat()">
            <option value="">Select device...</option>
            {% for dev in devices %}
            <option value="{{ dev.id }}">{{ dev.name }}</option>
            {% endfor %}
        </select>
    </div>
    <div class="chat-page-body">
        <div class="chat-tabs" id="channel-tabs">
            <button class="chat-tab active" data-channel="" onclick="setChannel(this, '')">All</button>
            <button class="chat-tab" data-channel="SERVER" onclick="setChannel(this, 'SERVER')">Kingdom</button>
            <button class="chat-tab" data-channel="UNION" onclick="setChannel(this, 'UNION')">Alliance</button>
            <button class="chat-tab" data-channel="FACTION" onclick="setChannel(this, 'FACTION')">Faction</button>
            <button class="chat-tab" data-channel="WORLD" onclick="setChannel(this, 'WORLD')">World</button>
            <button class="chat-tab" data-channel="PRIVATE" onclick="setChannel(this, 'PRIVATE')">Private</button>
        </div>
        <div class="chat-messages" id="chat-messages">
            <div class="chat-messages-empty">
                <div class="chat-messages-empty-icon">&#128172;</div>
                <div class="chat-messages-empty-text">Select a device to view chat</div>
            </div>
        </div>
        <div class="chat-modal-footer">
            <button type="button" class="chat-system-toggle" id="system-toggle" onclick="toggleSystem(this)">System</button>
            <span class="chat-system-count" id="system-count"></span>
            <span class="chat-status-text" id="chat-status"></span>
        </div>
    </div>
</div>

{% endblock %}

{% block scripts %}
<script>
var _chatChannel = '';
var _chatPollId = null;
var _showSystem = false;
var _lastMessages = [];

var _channelMap = {
    'SERVER': {name:'Kingdom', cls:'server'},
    'UNION': {name:'Alliance', cls:'union'},
    'UNION_R4': {name:'Alliance', cls:'union'},
    'FACTION': {name:'Faction', cls:'faction'},
    'WORLD': {name:'World', cls:'world'},
    'PRIVATE': {name:'Private', cls:'private'}
};
var _channelNames = {SERVER:'Kingdom',UNION:'Alliance',FACTION:'Faction',WORLD:'World',PRIVATE:'Private'};

function setChannel(btn, channel) {
    _chatChannel = channel;
    document.querySelectorAll('#channel-tabs .chat-tab').forEach(function(t) { t.classList.remove('active'); });
    btn.classList.add('active');
    loadChat();
}

function toggleSystem(btn) {
    _showSystem = !_showSystem;
    btn.classList.toggle('active', _showSystem);
    renderMessages(_lastMessages);
    updateStatus(_lastMessages);
}

function loadChat() {
    var device = document.getElementById('device-select').value;
    if (!device) return;
    var url = RELAY_PREFIX + '/api/chat?device=' + encodeURIComponent(device);
    if (_chatChannel) url += '&channel=' + encodeURIComponent(_chatChannel);
    fetch(url)
        .then(function(r) { return r.json(); })
        .then(function(data) {
            _lastMessages = data.messages || [];
            renderMessages(_lastMessages);
            updateStatus(_lastMessages);
        })
        .catch(function() {
            document.getElementById('chat-status').textContent = 'Error loading chat';
        });
}

function updateStatus(messages) {
    var systemCount = messages.filter(function(m) { return m.payload_type === 11; }).length;
    var visible = _showSystem ? messages : messages.filter(function(m) { return m.payload_type !== 11; });
    var text = visible.length + ' messages';
    if (_chatChannel) text += ' \u00b7 ' + (_channelNames[_chatChannel] || _chatChannel);
    document.getElementById('chat-status').textContent = text;
    document.getElementById('system-count').textContent =
        systemCount > 0 ? systemCount + ' hidden' : '';
}

function renderMessages(messages) {
    var container = document.getElementById('chat-messages');
    var wasAtBottom = container.scrollHeight - container.scrollTop - container.clientHeight < 50;
    container.textContent = '';
    var filtered = _showSystem ? messages : messages.filter(function(m) { return m.payload_type !== 11; });
    if (filtered.length === 0) {
        var empty = document.createElement('div');
        empty.className = 'chat-messages-empty';
        var icon = document.createElement('div');
        icon.className = 'chat-messages-empty-icon';
        icon.innerHTML = '&#128172;';
        empty.appendChild(icon);
        var hint = document.createElement('div');
        hint.className = 'chat-messages-empty-text';
        hint.textContent = messages.length > 0
            ? 'All messages are system notifications.\nToggle "System" below to view them.'
            : 'No messages yet.\nProtocol must be active and game chat open.';
        empty.appendChild(hint);
        container.appendChild(empty);
        return;
    }
    var lastDateStr = '';
    filtered.forEach(function(msg) {
        if (msg.timestamp > 0) {
            var msgDate = new Date(msg.timestamp);
            var dateStr = msgDate.toLocaleDateString(undefined, {year:'numeric', month:'short', day:'numeric'});
            if (dateStr !== lastDateStr) {
                lastDateStr = dateStr;
                var sep = document.createElement('div');
                sep.className = 'chat-date-sep';
                var line1 = document.createElement('div');
                line1.className = 'chat-date-line';
                var label = document.createElement('span');
                label.className = 'chat-date-label';
                label.textContent = dateStr;
                var line2 = document.createElement('div');
                line2.className = 'chat-date-line';
                sep.appendChild(line1);
                sep.appendChild(label);
                sep.appendChild(line2);
                container.appendChild(sep);
            }
        }
        var isSystem = msg.payload_type === 11;
        var isCoord = msg.payload_type === 5;
        var ch = _channelMap[msg.channel] || {name: msg.channel || '?', cls: 'server'};
        if (isSystem) ch = {name: 'System', cls: 'system'};

        var div = document.createElement('div');
        div.className = 'chat-msg ch-' + ch.cls;

        var row = document.createElement('div');
        row.className = 'chat-msg-row';

        var time = document.createElement('span');
        time.className = 'chat-time';
        if (msg.timestamp > 0) {
            var d = new Date(msg.timestamp);
            time.textContent = ('0'+d.getHours()).slice(-2) + ':' + ('0'+d.getMinutes()).slice(-2);
        }
        row.appendChild(time);

        var badge = document.createElement('span');
        badge.className = 'chat-channel-badge badge-' + ch.cls;
        badge.textContent = ch.name;
        row.appendChild(badge);

        if (msg.union_name) {
            var union = document.createElement('span');
            union.className = 'chat-union-tag';
            union.textContent = '[' + msg.union_name + ']';
            row.appendChild(union);
        }

        var isR4 = msg.channel === 'UNION_R4';
        var sender = document.createElement('span');
        sender.className = 'chat-sender chat-sender-' + (isR4 ? 'r4' : ch.cls);
        sender.textContent = msg.sender || (isSystem ? 'System' : '???');
        row.appendChild(sender);

        div.appendChild(row);

        var text = (msg.content || '').replace(/\[[^\]]*\|(@[^\]]+)\]/g, '[$1]');
        var content = document.createElement('div');
        content.className = isSystem ? 'chat-content-system' : (isCoord ? 'chat-content chat-content-coord' : 'chat-content');
        content.textContent = text;
        div.appendChild(content);

        if (msg.translated) {
            var tl = document.createElement('div');
            tl.className = 'chat-content-translated';
            tl.textContent = msg.translated;
            div.appendChild(tl);
        }

        container.appendChild(div);
    });
    if (wasAtBottom) container.scrollTop = container.scrollHeight;
}

function startPoll() {
    if (_chatPollId) clearInterval(_chatPollId);
    _chatPollId = setInterval(function() {
        var device = document.getElementById('device-select').value;
        if (device) loadChat();
    }, 3000);
}

document.addEventListener('DOMContentLoaded', function() {
    startPoll();
    var sel = document.getElementById('device-select');
    if (sel.options.length === 2) {
        sel.selectedIndex = 1;
        loadChat();
    }
});
</script>
{% endblock %}
